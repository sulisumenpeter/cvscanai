<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CVScan AI — ATS Analyzer | Sulisumen Peter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
/* CSS Variables & Global Styles */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060c18;--surface:#0d1526;--surface2:#111d35;--surface3:#162240;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --green:#00d4aa;--green2:#00b891;--green-dim:rgba(0,212,170,0.1);--green-glow:rgba(0,212,170,0.22);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.1);
  --amber:#ffb347;--amber-dim:rgba(255,179,71,0.1);
  --text:#e8edf5;--text2:#8a9ab5;--text3:#4a5a75;
  --r:14px;--r-sm:8px;--r-xs:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* SOCIAL ICONS CSS */
.social-links { display: flex; gap: 12px; justify-content: center; margin-top: 15px; }
.social-icon {
  text-decoration: none; font-size: 18px; display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 50%; transition: 0.3s;
}
.social-icon:hover { transform: translateY(-3px); border-color: var(--green); background: var(--surface3); }

/* EXISTING UI STYLES */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:10px 20px;font-size:13px;color:var(--text);transition:0.3s;z-index:9999}
#toast.show{transform:translateX(-50%) translateY(0)}
header{border-bottom:1px solid var(--border);padding:12px 24px;background:rgba(6,12,24,0.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
.header-inner{max-width:1140px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.logo-name{font-family:'Sora',sans-serif;font-weight:800;font-size:16px}
.hero{text-align:center;padding:60px 24px 40px}
h1{font-family:'Sora',sans-serif;font-size:clamp(30px,5vw,52px);font-weight:800;margin-bottom:14px}
h1 em{font-style:normal;color:var(--green)}
.main{max-width:1140px;margin:0 auto;padding:0 24px 80px}
.input-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:20px;margin-bottom:32px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.ic-tabs{display:flex;background:var(--surface2);border-radius:var(--r-xs);padding:4px;gap:4px;margin-bottom:12px}
.ic-tab{flex:1;padding:8px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3)}
.ic-tab.active{background:var(--surface3);color:var(--text)}
.upload-zone{padding:30px;text-align:center;border:2px dashed var(--border2);border-radius:var(--r-sm);cursor:pointer;background:var(--surface2)}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;resize:none;outline:none}
.btn-analyze{width:100%;background:linear-gradient(135deg,var(--green),var(--green2));color:#060c18;padding:18px;border-radius:var(--r-sm);border:none;font-family:'Sora',sans-serif;font-weight:800;font-size:16px;cursor:pointer;transition:0.2s}
#results-area{display:none;margin-top:40px}
.score-hero{background:var(--surface);padding:32px;border-radius:var(--r);display:flex;align-items:center;gap:30px;margin-bottom:20px}
.score-num{font-family:'Sora',sans-serif;font-size:48px;font-weight:800;color:var(--green)}
.kw-grid{display:flex;flex-wrap:wrap;gap:8px}
.kw{padding:6px 12px;border-radius:100px;font-size:12px;font-weight:600;font-family:'DM Mono'}
.kw-match{background:var(--green-dim);color:var(--green)}
.kw-miss{background:var(--red-dim);color:var(--red)}
footer{text-align:center;padding:40px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
footer a{color:var(--green);text-decoration:none}
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div style="font-size:24px">🎯</div>
      <div>
        <div class="logo-name">CVScan AI</div>
        <div style="font-size:10px;color:var(--text3)">by Sulisumen
