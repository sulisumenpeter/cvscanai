<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVScan AI — Lisumen Innovative Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        /* Modern UI Styling for Lisumen Hub */
        :root { --bg: #060c18; --g: #00d4aa; --t1: #e8edf5; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t1); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 200px; margin-bottom: 20px; background: #111d35; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px; }
        button { background: var(--g); color: #000; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #results { margin-top: 40px; display: none; background: #111d35; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CVScan AI</h1>
        <p>Built by Lisumen Innovative Hub · Powered by Gemini</p>
        
        <h3>1. Your CV Text</h3>
        <textarea id="cv-txt" placeholder="Paste CV here..."></textarea>
        
        <h3>2. Job Description</h3>
        <textarea id="jd-txt" placeholder="Paste Job Description here..."></textarea>
        
        <button onclick="analyze()">⚡ Analyze CV</button>

        <div id="results">
            <h2>Analysis Results</h2>
            <div id="output"></div>
        </div>
    </div>

    <script>
        async function analyze() {
            const cv = document.getElementById('cv-txt').value;
            const jd = document.getElementById('jd-txt').value;
            if(!cv || !jd) return alert("Please fill both fields.");

            const btn = document.querySelector('button');
            btn.innerText = "Analyzing...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cv, jd })
                });
                const data = await res.json();
                const analysis = JSON.parse(data.result);
                
                document.getElementById('results').style.display = 'block';
                document.getElementById('output').innerHTML = `
                    <h3>Score: ${analysis.score}/100</h3>
                    <p><strong>Strengths:</strong> ${analysis.strengths.join(', ')}</p>
                    <p><strong>Missing:</strong> ${analysis.missing_keywords.join(', ')}</p>
                `;
            } catch (err) {
                alert("Error during analysis.");
            } finally {
                btn.innerText = "⚡ Analyze CV";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
