<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CVScan AI — Lisumen Innovative Hub</title>
    <style>
        body { background: #060c18; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: #111d35; padding: 20px; border-radius: 12px; }
        textarea { width: 90%; height: 120px; margin: 10px 0; border-radius: 8px; background: #060c18; color: white; border: 1px solid #333; padding: 10px; }
        button { background: #00d4aa; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 94%; font-weight: bold; }
        #results { margin-top: 20px; text-align: left; display: none; padding: 15px; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎯 CVScan AI</h1>
        <p>Lisumen Innovative Hub · Nigeria</p>
        <textarea id="cv" placeholder="Paste CV text here..."></textarea>
        <textarea id="jd" placeholder="Paste Job Description here..."></textarea>
        <button id="btn" onclick="analyze()">⚡ ANALYZE NOW</button>
        
        <div id="results">
            <h2 id="score-text"></h2>
            <p><strong>Strengths:</strong> <span id="str"></span></p>
            <p><strong>Missing Keywords:</strong> <span id="miss"></span></p>
        </div>
    </div>

    <script>
        async function analyze() {
            const cv = document.getElementById('cv').value;
            const jd = document.getElementById('jd').value;
            const btn = document.getElementById('btn');
            
            if(!cv || !jd) return alert("Please fill in both boxes.");

            btn.innerText = "⏳ ANALYZING...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cv, jd })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                // Display results
                document.getElementById('results').style.display = 'block';
                document.getElementById('score-text').innerText = "ATS Score: " + data.score + "/100";
                document.getElementById('str').innerText = data.strengths.join(', ');
                document.getElementById('miss').innerText = data.missing_keywords.join(', ');

            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btn.innerText = "⚡ ANALYZE NOW";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
